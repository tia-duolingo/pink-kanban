<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>🦴 Bones</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  /* ---------- Pink Retro Theme (default) ---------- */
  :root {
    --bg: #1a0723;
    --bg2: #2a0e3a;
    --panel: #3a1352;
    --panel-2: #4a1968;
    --ink: #ffe6f5;
    --pink: #ff3eaa;
    --pink-2: #ff7ac6;
    --pink-soft: #ffb3d9;
    --hot: #ff0080;
    --cyan: #6fe9ff;
    --yellow: #ffe066;
    --green: #7dffac;
    --shadow-ink: #1a0723;
    --body-grad: linear-gradient(rgba(26,7,35,0.90), rgba(26,7,35,0.90)), repeating-linear-gradient(0deg, transparent 0 2px, rgba(255,62,170,0.05) 2px 3px), radial-gradient(ellipse at top, #4a1968 0%, #1a0723 60%);
    --scanlines: repeating-linear-gradient(0deg, rgba(0,0,0,0.15) 0 1px, transparent 1px 3px);
    --panel-texture: none;
    --header-grad: linear-gradient(180deg, var(--panel-2) 0%, var(--panel) 100%);
    --header-ink: var(--pink-soft);
  }

  /* ---------- Dungeon Theme ---------- */
  [data-theme="dungeon"] {
    --bg: #0d1018;
    --bg2: #161b28;
    --panel: #232233;
    --panel-2: #2f2c44;
    --ink: #f0e0c0;
    --pink: #ff8c42;        /* torch orange */
    --pink-2: #ffb347;      /* lighter flame */
    --pink-soft: #ffc266;   /* soft amber */
    --hot: #ff6b35;         /* deep ember */
    --cyan: #6da7d6;        /* cool stone blue */
    --yellow: #ffd966;      /* candle glow */
    --green: #8bc66e;       /* mossy green */
    --shadow-ink: #06070d;
    --body-grad:
      linear-gradient(rgba(13,16,24,0.78), rgba(13,16,24,0.92)),
      radial-gradient(ellipse at top, #3a2e2a 0%, #0d1018 70%);
    --scanlines:
      repeating-linear-gradient(0deg, rgba(0,0,0,0.25) 0 1px, transparent 1px 3px),
      repeating-linear-gradient(0deg, transparent 0 28px, rgba(0,0,0,0.30) 28px 29px),
      repeating-linear-gradient(90deg, transparent 0 44px, rgba(0,0,0,0.30) 44px 45px);
    --panel-texture:
      linear-gradient(135deg, rgba(255,255,255,0.04) 0%, transparent 40%),
      repeating-linear-gradient(0deg, transparent 0 24px, rgba(0,0,0,0.22) 24px 25px),
      repeating-linear-gradient(90deg, transparent 0 38px, rgba(0,0,0,0.22) 38px 39px);
    --header-grad: linear-gradient(180deg, #4a3a2a 0%, #2a2438 100%);
    --header-ink: var(--ink);
  }
  [data-theme="dungeon"] h1 {
    text-shadow: 2px 2px 0 #000, 0 0 14px var(--pink), 0 0 26px var(--hot);
  }
  [data-theme="dungeon"] body::before {
    mix-blend-mode: multiply;
    opacity: 0.85;
  }
  [data-theme="dungeon"] .column,
  [data-theme="dungeon"] .modal,
  [data-theme="dungeon"] .auth-card {
    background-image: var(--panel-texture);
    background-color: var(--panel);
  }
  [data-theme="dungeon"] .column-header { color: var(--header-ink); text-shadow: 1px 1px 0 #000; }
  [data-theme="dungeon"] .column-name { color: var(--pink-soft); }
  [data-theme="dungeon"] .col-handle { color: var(--pink-soft); }
  [data-theme="dungeon"] .tab .x { color: #1a0f06; }
  [data-theme="dungeon"] button.btn { color: #1a0f06; }
  [data-theme="dungeon"] .tab.active { color: #1a0f06; }
  [data-theme="dungeon"] .priority.low,
  [data-theme="dungeon"] .priority.medium,
  [data-theme="dungeon"] .priority { color: #1a0f06; }
  [data-theme="dungeon"] .public-badge { color: #1a0f06; }
  [data-theme="dungeon"] .private-badge { color: var(--pink-soft); border-color: var(--pink); background: var(--bg2); }
  [data-theme="dungeon"] .tag { color: #1a0f06; }
  [data-theme="dungeon"] .due { background: #06070d; }
  [data-theme="dungeon"] .column-count { background: #06070d; color: var(--pink-soft); }
  [data-theme="dungeon"] .icon-btn { background: #06070d; color: var(--pink-soft); }
  [data-theme="dungeon"] .icon-btn:hover { background: var(--pink); color: #1a0f06; }
  [data-theme="dungeon"] .card .cobweb svg g { stroke: #d8d0b8; }
  /* Flickering candles in the corners */
  [data-theme="dungeon"] body::after {
    content: '';
    position: fixed; inset: 0;
    pointer-events: none;
    z-index: 999;
    background:
      radial-gradient(circle at 4% 18%, rgba(255,140,66,0.18) 0%, transparent 14%),
      radial-gradient(circle at 96% 22%, rgba(255,140,66,0.15) 0%, transparent 12%),
      radial-gradient(circle at 8% 88%, rgba(255,140,66,0.14) 0%, transparent 14%),
      radial-gradient(circle at 92% 84%, rgba(255,140,66,0.18) 0%, transparent 12%);
    animation: candle-flicker 3.2s ease-in-out infinite;
  }
  @keyframes candle-flicker {
    0%, 100% { opacity: 0.9; }
    23%      { opacity: 0.65; }
    47%      { opacity: 1.0; }
    58%      { opacity: 0.75; }
    79%      { opacity: 0.95; }
  }

  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    font-family: 'Space Mono', 'VT323', monospace;
    color: var(--ink);
    background: var(--body-grad);
    background-attachment: fixed;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    pointer-events: none;
    background: var(--scanlines);
    z-index: 1000;
    mix-blend-mode: multiply;
  }

  /* ---------- Header ---------- */
  header {
    padding: 18px 24px;
    border-bottom: 3px solid var(--pink);
    background: linear-gradient(180deg, rgba(255,62,170,0.15), transparent);
    display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
    position: sticky; top: 0; z-index: 50;
    backdrop-filter: blur(6px);
  }
  h1 {
    font-family: 'Press Start 2P', monospace;
    font-size: 18px; margin: 0;
    color: var(--pink-soft);
    text-shadow: 2px 2px 0 #000, 0 0 18px var(--hot), 0 0 30px var(--pink);
    letter-spacing: 1px;
  }
  h1 .star { color: var(--yellow); }

  .board-tabs {
    display: flex; gap: 6px; flex-wrap: wrap; flex: 1;
  }
  .tab {
    font-family: 'VT323', monospace;
    font-size: 20px;
    padding: 6px 14px;
    background: var(--panel);
    color: var(--ink);
    border: 2px solid var(--pink);
    cursor: pointer;
    box-shadow: 3px 3px 0 #000;
    text-transform: uppercase;
    letter-spacing: 1px;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .tab:hover { background: var(--panel-2); }
  .tab.active {
    background: var(--pink);
    color: #1a0723;
    box-shadow: 3px 3px 0 #000, 0 0 16px var(--pink);
  }
  .tab .pub-dot {
    display: inline-block; width: 8px; height: 8px;
    border-radius: 50%; background: var(--green);
    box-shadow: 0 0 6px var(--green);
  }
  .tab .x {
    margin-left: 4px;
    color: #1a0723;
    font-weight: bold;
    opacity: 0.6;
  }
  .tab .x:hover { opacity: 1; }

  .header-actions { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }

  /* Burger menu */
  .menu-wrap { position: relative; display: inline-block; }
  .menu-panel {
    position: absolute;
    top: calc(100% + 8px);
    right: 0;
    background: var(--panel);
    border: 2px solid var(--pink);
    box-shadow: 4px 4px 0 #000;
    padding: 12px;
    min-width: 220px;
    display: none;
    z-index: 60;
  }
  .menu-panel.open { display: flex; flex-direction: column; gap: 10px; }
  .menu-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .user-chip {
    font-family: 'VT323', monospace;
    font-size: 16px;
    color: var(--pink-soft);
    padding: 0 10px;
    border-right: 2px solid var(--pink);
  }

  /* ---------- Buttons ---------- */
  button.btn, .btn {
    font-family: 'VT323', monospace;
    font-size: 18px;
    padding: 6px 14px;
    background: var(--pink);
    color: #1a0723;
    border: 2px solid #000;
    cursor: pointer;
    box-shadow: 3px 3px 0 #000;
    text-transform: uppercase;
    letter-spacing: 1px;
    transition: transform 0.05s ease, box-shadow 0.05s ease;
  }
  button.btn:hover, .btn:hover { background: var(--pink-2); }
  button.btn:active, .btn:active {
    transform: translate(2px, 2px);
    box-shadow: 1px 1px 0 #000;
  }
  button.btn.ghost {
    background: transparent;
    color: var(--pink-soft);
    border-color: var(--pink);
  }
  button.btn.ghost:hover { background: rgba(255,62,170,0.15); }
  button.btn.danger { background: var(--hot); color: #fff; }
  button:disabled { opacity: 0.5; cursor: not-allowed; }

  /* ---------- Board Area ---------- */
  main { padding: 20px 24px 80px; overflow-x: auto; }
  .board-title-row {
    display: flex; align-items: center; gap: 14px; margin-bottom: 16px; flex-wrap: wrap;
  }
  .board-title {
    font-family: 'Press Start 2P', monospace;
    font-size: 14px; color: var(--pink-soft);
    text-shadow: 2px 2px 0 #000; margin: 0;
  }
  .board-meta { font-size: 14px; color: var(--pink-soft); opacity: 0.7; }
  .public-badge {
    font-family: 'VT323', monospace;
    font-size: 14px;
    padding: 2px 8px;
    background: var(--green); color: #1a0723;
    border: 2px solid #000;
    text-transform: uppercase; letter-spacing: 1px;
  }
  .private-badge {
    font-family: 'VT323', monospace;
    font-size: 14px;
    padding: 2px 8px;
    background: var(--panel-2); color: var(--pink-soft);
    border: 2px solid var(--pink);
    text-transform: uppercase; letter-spacing: 1px;
  }
  .read-only-banner {
    background: rgba(255,224,102,0.15);
    border: 2px solid var(--yellow);
    color: var(--yellow);
    padding: 8px 12px;
    margin-bottom: 14px;
    font-family: 'VT323', monospace;
    font-size: 16px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .columns { display: flex; flex-direction: column; gap: 22px; min-height: 60vh; }

  /* ---------- Swimlanes ---------- */
  .swimlane { display: flex; flex-direction: column; gap: 10px; }
  .swimlane-header {
    display: flex; align-items: center; gap: 14px;
    flex-wrap: wrap;
  }
  .swimlane-toggle {
    font-family: 'Press Start 2P', monospace;
    font-size: 14px;
    color: var(--pink-soft);
    text-shadow: 2px 2px 0 #000;
    cursor: pointer;
    user-select: none;
    display: inline-block;
    transition: transform 0.18s ease;
    line-height: 1;
    padding: 2px 4px;
  }
  .swimlane-toggle:hover { color: #fff; }
  .swimlane:not(.collapsed) .swimlane-toggle { transform: rotate(90deg); }
  .swimlane-name {
    font-family: 'Press Start 2P', monospace;
    font-size: 14px; color: var(--pink-soft);
    text-shadow: 2px 2px 0 #000; margin: 0;
    outline: none;
    cursor: text;
    word-break: break-word;
  }
  .swimlane-name[contenteditable="true"]:focus {
    background: rgba(255,62,170,0.15);
  }
  .swimlane-meta { font-size: 14px; color: var(--pink-soft); opacity: 0.7; }
  .swimlane-delete { font-size: 13px !important; padding: 2px 8px !important; }
  .swimlane-cols {
    display: flex; gap: 18px; align-items: flex-start;
    overflow-x: auto;
    padding-bottom: 6px;
  }
  .swimlane.collapsed .swimlane-cols { display: none; }
  .add-swimlane {
    align-self: flex-start;
    padding: 8px 16px;
    border: 2px dashed var(--pink);
    background: transparent;
    color: var(--pink-soft);
    cursor: pointer;
    font-family: 'VT323', monospace;
    font-size: 16px;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-top: 4px;
  }
  .add-swimlane:hover { background: rgba(255,62,170,0.15); color: #fff; }

  .column {
    background: var(--panel);
    border: 3px solid var(--pink);
    box-shadow: 5px 5px 0 #000, 0 0 20px rgba(255,62,170,0.25);
    width: 290px; min-width: 290px;
    display: flex; flex-direction: column;
    max-height: 78vh;
  }
  .column-header {
    padding: 10px 12px;
    background: var(--header-grad);
    color: var(--header-ink);
    display: flex; align-items: center; gap: 8px;
    border-bottom: 2px solid #000;
  }
  .col-handle {
    cursor: grab;
    font-family: 'VT323', monospace;
    font-size: 18px;
    line-height: 1;
    color: var(--header-ink);
    padding: 0 2px;
    user-select: none;
    opacity: 0.7;
  }
  .col-handle:hover { opacity: 1; }
  .col-handle:active { cursor: grabbing; }
  .column.col-dragging { opacity: 0.4; }
  .column.col-drop-before { box-shadow: -6px 0 0 var(--cyan), 5px 5px 0 #000, 0 0 20px rgba(255,62,170,0.25); }
  .column.col-drop-after  { box-shadow: 6px 0 0 var(--cyan), 5px 5px 0 #000, 0 0 20px rgba(255,62,170,0.25); }
  .column-name {
    font-family: 'Press Start 2P', monospace;
    font-size: 11px;
    flex: 1; outline: none;
    cursor: text;
    word-break: break-word;
  }
  .column-name[contenteditable="true"]:focus {
    background: rgba(255,255,255,0.25);
  }
  .column-count {
    font-family: 'VT323', monospace;
    font-size: 18px;
    background: #1a0723;
    color: var(--pink-soft);
    padding: 0 8px;
    border: 2px solid #000;
  }
  .column-actions { display: flex; gap: 4px; }
  .icon-btn {
    background: #1a0723;
    color: var(--pink-soft);
    border: 2px solid #000;
    width: 26px; height: 26px;
    cursor: pointer;
    font-family: 'VT323', monospace;
    font-size: 18px;
    line-height: 1;
    display: inline-flex; align-items: center; justify-content: center;
  }
  .icon-btn:hover { background: var(--pink); color: #1a0723; }

  .cards {
    padding: 10px;
    display: flex; flex-direction: column; gap: 10px;
    overflow-y: auto;
    flex: 1; min-height: 60px;
  }
  .cards.drag-over {
    background: rgba(255,62,170,0.10);
    outline: 2px dashed var(--pink-2);
    outline-offset: -6px;
  }

  .card {
    background: var(--panel-2);
    border: 2px solid var(--pink-2);
    padding: 10px;
    cursor: grab;
    box-shadow: 3px 3px 0 #000;
    font-size: 15px;
    line-height: 1.35;
    position: relative;
  }
  /* Color presets */
  .card.color-pink   { background: rgba(255,62,170,0.18); border-color: var(--pink); }
  .card.color-cyan   { background: rgba(111,233,255,0.15); border-color: var(--cyan); }
  .card.color-yellow { background: rgba(255,224,102,0.15); border-color: var(--yellow); }
  .card.color-green  { background: rgba(125,255,172,0.15); border-color: var(--green); }
  .card.color-red    { background: rgba(255,0,128,0.18); border-color: var(--hot); }
  .card.color-purple { background: rgba(155,89,255,0.18); border-color: #b388ff; }

  /* Cobweb (stale cards) */
  .card .cobweb {
    position: absolute; inset: 0;
    pointer-events: none;
    z-index: 1;
    opacity: 0.55;
    animation: cobweb-drift 8s ease-in-out infinite;
    overflow: visible;
  }
  .card .cobweb svg {
    width: 100%; height: 100%;
    display: block;
    overflow: visible;
    filter: drop-shadow(0 0 2px rgba(255,255,255,0.35));
  }
  @keyframes cobweb-drift {
    0%, 100% { opacity: 0.55; }
    50%      { opacity: 0.7; }
  }
  .card.dusting { overflow: visible; }
  .card.dusting .cobweb {
    animation: cobweb-puff 0.8s ease-in forwards;
    transform-origin: center;
  }
  @keyframes cobweb-puff {
    0%   { opacity: 0.7; transform: scale(1) rotate(0deg); }
    50%  { opacity: 0.4; transform: scale(0.85) rotate(8deg); filter: blur(1px); }
    100% { opacity: 0; transform: scale(0.6) rotate(20deg); filter: blur(3px); }
  }
  .card .broom {
    position: absolute;
    top: 50%; right: -36px;
    font-size: 30px;
    transform: translateY(-50%);
    pointer-events: none;
    animation: broom-sweep 0.8s ease-in-out forwards;
    z-index: 2;
    filter: drop-shadow(0 0 6px var(--pink));
  }
  @keyframes broom-sweep {
    0%   { right: -36px; opacity: 0; transform: translateY(-50%) rotate(20deg); }
    15%  { opacity: 1; }
    85%  { opacity: 1; }
    100% { right: calc(100% + 10px); opacity: 0; transform: translateY(-50%) rotate(-30deg); }
  }
  .card:active { cursor: grabbing; }
  .card.dragging { opacity: 0.4; }
  .card-title {
    font-family: 'VT323', monospace;
    font-size: 20px;
    color: var(--ink);
    margin-bottom: 4px;
    word-break: break-word;
  }
  .card-meta {
    display: flex; gap: 6px; flex-wrap: wrap; margin-top: 6px;
    font-size: 13px;
  }
  .due {
    background: #1a0723;
    color: var(--cyan);
    padding: 1px 6px;
    border: 1px solid var(--cyan);
    font-family: 'VT323', monospace;
  }
  .due.overdue { color: #ff7777; border-color: #ff7777; }
  .due.soon { color: var(--yellow); border-color: var(--yellow); }

  .priority {
    padding: 1px 6px;
    border: 1px solid #000;
    font-family: 'VT323', monospace;
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #1a0723;
  }
  .priority.low    { background: var(--cyan); }
  .priority.medium { background: var(--yellow); }
  .priority.high   { background: var(--hot); color: #fff; }

  .tag {
    background: var(--pink);
    color: #1a0723;
    padding: 1px 6px;
    border: 1px solid #000;
    font-family: 'VT323', monospace;
    font-size: 13px;
    text-transform: uppercase;
  }

  /* Color swatches in card modal */
  .swatches {
    display: flex; gap: 8px; flex-wrap: wrap;
  }
  .swatch {
    width: 32px; height: 32px;
    border: 2px solid #000;
    cursor: pointer;
    box-shadow: 2px 2px 0 #000;
    position: relative;
  }
  .swatch[data-color="default"] { background: var(--panel-2); border-color: var(--pink-2); }
  .swatch[data-color="pink"]   { background: var(--pink); }
  .swatch[data-color="cyan"]   { background: var(--cyan); }
  .swatch[data-color="yellow"] { background: var(--yellow); }
  .swatch[data-color="green"]  { background: var(--green); }
  .swatch[data-color="red"]    { background: var(--hot); }
  .swatch[data-color="purple"] { background: #b388ff; }
  .swatch.selected::after {
    content: '✓';
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    color: #1a0723; font-weight: bold; font-size: 18px;
    text-shadow: 0 0 4px #fff;
  }
  .swatch[data-color="default"].selected::after,
  .swatch[data-color="red"].selected::after { color: #fff; text-shadow: 0 0 4px #000; }

  .add-card {
    margin: 0 10px 10px;
    padding: 6px;
    border: 2px dashed var(--pink);
    background: transparent;
    color: var(--pink-soft);
    cursor: pointer;
    font-family: 'VT323', monospace;
    font-size: 16px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .add-card:hover { background: rgba(255,62,170,0.1); color: #fff; }

  .add-column {
    align-self: flex-start;
    width: 44px; min-width: 44px;
    height: 44px;
    border: 2px dashed var(--pink);
    background: transparent;
    color: var(--pink-soft);
    cursor: pointer;
    font-family: 'VT323', monospace;
    font-size: 28px;
    line-height: 1;
    display: inline-flex; align-items: center; justify-content: center;
  }
  .add-column:hover { background: rgba(255,62,170,0.15); color: #fff; border-color: var(--pink-soft); }

  /* ---------- Modal ---------- */
  .modal-bg {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.6);
    display: none; align-items: center; justify-content: center;
    z-index: 200;
    padding: 20px;
  }
  .modal-bg.show { display: flex; }
  .modal {
    background: var(--panel);
    border: 3px solid var(--pink);
    box-shadow: 8px 8px 0 #000, 0 0 30px rgba(255,62,170,0.5);
    width: 100%; max-width: 480px;
    padding: 18px;
    color: var(--ink);
    font-family: 'Space Mono', monospace;
    max-height: 90vh; overflow-y: auto;
  }
  .modal h2 {
    font-family: 'Press Start 2P', monospace;
    font-size: 13px;
    color: var(--pink-soft);
    text-shadow: 2px 2px 0 #000;
    margin: 0 0 14px;
  }
  .field { margin-bottom: 12px; }
  .field label {
    display: block;
    font-family: 'VT323', monospace;
    font-size: 18px;
    color: var(--pink-soft);
    margin-bottom: 4px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .field input, .field textarea {
    width: 100%;
    background: var(--bg);
    border: 2px solid var(--pink);
    color: var(--ink);
    padding: 8px;
    font-family: 'Space Mono', monospace;
    font-size: 14px;
    outline: none;
  }
  .field input:focus, .field textarea:focus {
    border-color: var(--pink-soft);
    box-shadow: 0 0 8px var(--pink);
  }
  .field textarea { resize: vertical; min-height: 80px; }
  .modal-actions {
    display: flex; gap: 8px; justify-content: flex-end; flex-wrap: wrap;
    margin-top: 14px;
  }

  /* ---------- Auth screen ---------- */
  .auth-screen {
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    padding: 24px;
  }
  .auth-card {
    background: var(--panel);
    border: 3px solid var(--pink);
    box-shadow: 8px 8px 0 #000, 0 0 30px rgba(255,62,170,0.5);
    padding: 32px;
    max-width: 440px; width: 100%;
    text-align: center;
  }
  .auth-card h1 {
    margin: 0 0 8px;
    font-size: 22px;
  }
  .auth-card p {
    font-family: 'VT323', monospace;
    font-size: 18px;
    color: var(--pink-soft);
    margin: 8px 0 22px;
    line-height: 1.4;
  }
  .auth-card .field { text-align: left; }
  .auth-msg {
    margin-top: 14px;
    font-family: 'VT323', monospace;
    font-size: 16px;
    min-height: 22px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .auth-msg.ok { color: var(--green); }
  .auth-msg.err { color: var(--hot); }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--pink-soft);
    font-family: 'VT323', monospace;
    font-size: 22px;
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 24px; left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--pink); color: #1a0723;
    padding: 10px 18px;
    border: 2px solid #000;
    box-shadow: 4px 4px 0 #000;
    font-family: 'VT323', monospace;
    font-size: 18px;
    text-transform: uppercase; letter-spacing: 1px;
    transition: transform 0.25s ease;
    z-index: 300; pointer-events: none;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--pink); border: 2px solid var(--bg); }

  @media (max-width: 640px) {
    h1 { font-size: 14px; }
    main { padding: 14px; }
    .swimlane-cols { flex-direction: column; }
    .column, .add-column { width: 100%; min-width: 0; }
  }

  [hidden] { display: none !important; }

  /* Confetti */
  .confetti-container {
    position: fixed; inset: 0;
    pointer-events: none;
    overflow: hidden;
    z-index: 999;
  }
  .confetti-piece {
    position: absolute;
    top: -10vh;
    width: 10px; height: 14px;
    animation: confetti-fall linear forwards;
    will-change: transform;
  }
  @keyframes confetti-fall {
    0%   { transform: translate3d(0, 0, 0) rotate(0deg); }
    100% { transform: translate3d(var(--tx, 0), 110vh, 0) rotate(720deg); }
  }
</style>
</head>
<body>

<!-- Auth screen -->
<div id="authScreen" class="auth-screen">
  <div class="auth-card">
    <h1><span class="star">🦴</span> Bones</h1>
    <p>Sign in with your email — we'll send you a magic link.</p>
    <div class="field">
      <label for="emailInput">Email</label>
      <input id="emailInput" type="email" placeholder="you@example.com" autocomplete="email" />
    </div>
    <button class="btn" id="signinBtn" style="width:100%">Send magic link</button>
    <div class="auth-msg" id="authMsg"></div>
  </div>
</div>

<!-- App -->
<div id="app" hidden>
  <header>
    <h1><span class="star">🦴</span> Bones</h1>
    <div class="board-tabs" id="boardTabs"></div>
    <div class="header-actions">
      <span class="user-chip" id="userChip"></span>
      <button class="btn ghost" id="themeBtn" title="Switch theme">🕯️</button>
      <div class="menu-wrap">
        <button class="btn ghost" id="menuBtn" title="Board menu" aria-haspopup="true" aria-expanded="false">☰</button>
        <div class="menu-panel" id="menuPanel">
          <div class="menu-row">
            <span id="boardVis"></span>
            <button class="btn ghost" id="toggleVisBtn" hidden>Make public</button>
          </div>
        </div>
      </div>
      <button class="btn ghost" id="newBoardBtn">+ Board</button>
      <button class="btn ghost" id="signoutBtn">Sign out</button>
    </div>
  </header>

  <main>
    <div id="readOnlyBanner" class="read-only-banner" hidden>
      ★ Read-only — this is someone else's private board, or you're not signed in as the owner.
    </div>
    <div class="columns" id="columns"></div>
  </main>
</div>

<!-- Card edit modal -->
<div class="modal-bg" id="cardModal">
  <div class="modal">
    <h2 id="cardModalTitle">Edit Card</h2>
    <div class="field">
      <label for="cardTitle">Title</label>
      <input id="cardTitle" type="text" maxlength="200" />
    </div>
    <div class="field">
      <label for="cardDesc">Description</label>
      <textarea id="cardDesc" rows="4"></textarea>
    </div>
    <div class="field">
      <label for="cardDue">Due date</label>
      <input id="cardDue" type="date" />
    </div>
    <div class="field">
      <label for="cardPriority">Priority</label>
      <select id="cardPriority" style="width:100%;background:var(--bg);border:2px solid var(--pink);color:var(--ink);padding:8px;font-family:'Space Mono',monospace;font-size:14px;outline:none;">
        <option value="">None</option>
        <option value="low">Low</option>
        <option value="medium">Medium</option>
        <option value="high">High</option>
      </select>
    </div>
    <div class="field">
      <label>Card color</label>
      <div class="swatches" id="cardSwatches">
        <div class="swatch" data-color="default" title="Default"></div>
        <div class="swatch" data-color="pink"    title="Pink"></div>
        <div class="swatch" data-color="cyan"    title="Cyan"></div>
        <div class="swatch" data-color="yellow"  title="Yellow"></div>
        <div class="swatch" data-color="green"   title="Green"></div>
        <div class="swatch" data-color="red"     title="Red"></div>
        <div class="swatch" data-color="purple"  title="Purple"></div>
      </div>
    </div>
    <div class="field">
      <label for="cardTags">Tags (comma separated)</label>
      <input id="cardTags" type="text" placeholder="urgent, design, q2" />
    </div>
    <div class="field" style="display:flex;align-items:center;gap:8px;">
      <input id="cardCobweb" type="checkbox" style="width:auto;margin:0;cursor:pointer;" />
      <label for="cardCobweb" style="margin:0;cursor:pointer;">🕸️ Force cobweb</label>
    </div>
    <div class="modal-actions">
      <button class="btn danger" id="deleteCardBtn">Delete</button>
      <button class="btn ghost" id="cancelCardBtn">Cancel</button>
      <button class="btn" id="saveCardBtn">Save</button>
    </div>
  </div>
</div>

<!-- Board name modal -->
<div class="modal-bg" id="boardModal">
  <div class="modal">
    <h2 id="boardModalTitle">New Board</h2>
    <div class="field">
      <label for="boardName">Board name</label>
      <input id="boardName" type="text" maxlength="60" />
    </div>
    <div class="modal-actions">
      <button class="btn ghost" id="cancelBoardBtn">Cancel</button>
      <button class="btn" id="saveBoardBtn">Save</button>
    </div>
  </div>
</div>

<!-- Generic input modal (replacement for native prompt) -->
<div class="modal-bg" id="inputModal">
  <div class="modal">
    <h2 id="inputModalTitle">Add</h2>
    <div class="field">
      <label for="inputModalField" id="inputModalLabel">Name</label>
      <input id="inputModalField" type="text" maxlength="200" />
    </div>
    <div class="modal-actions">
      <button class="btn ghost" id="inputModalCancel">Cancel</button>
      <button class="btn" id="inputModalOk">Add</button>
    </div>
  </div>
</div>

<div class="toast" id="toast">saved</div>

<script>
/* ============================================================
 * Bones v3 — Supabase backend, magic-link auth, realtime
 * ============================================================ */
(function () {
  'use strict';

  const SUPABASE_URL = 'https://sjtxuegjdukjdobsxnhs.supabase.co';
  const SUPABASE_PUBLISHABLE_KEY = 'sb_publishable_YUZolKOL68u_n2SY1s2O8A_GJQjKwY0';
  const LEGACY_KEY = 'pink-kanban:v1';
  const THEME_KEY = 'bones:theme';

  // ---------- Theme ----------
  const THEMES = ['pink', 'dungeon'];
  function applyTheme(t) {
    if (!THEMES.includes(t)) t = 'pink';
    if (t === 'pink') document.documentElement.removeAttribute('data-theme');
    else document.documentElement.setAttribute('data-theme', t);
    try { localStorage.setItem(THEME_KEY, t); } catch (_) {}
    const btn = document.getElementById('themeBtn');
    if (btn) {
      // Show the icon for the theme you'd switch TO
      btn.textContent = t === 'dungeon' ? '🌸' : '🕯️';
      btn.title = t === 'dungeon' ? 'Switch to pink retro' : 'Switch to dungeon';
    }
  }
  // Apply saved theme immediately so the auth screen renders correctly
  applyTheme(localStorage.getItem(THEME_KEY) || 'pink');

  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_PUBLISHABLE_KEY, {
    auth: { persistSession: true, autoRefreshToken: true, detectSessionInUrl: true },
  });

  const uid = () => Math.random().toString(36).slice(2, 10) + Date.now().toString(36).slice(-4);
  const $ = (id) => document.getElementById(id);

  // ---------- App state ----------
  /** @type {{id:string,owner_id:string,name:string,data:{columns:any[]},is_public:boolean,updated_at:string}[]} */
  let boards = [];
  let activeBoardId = null;
  let me = null;            // session user
  let realtimeChannel = null;
  let saveTimer = null;
  let pendingSave = null;   // {boardId, payload}

  // ---------- Toast ----------
  const toastEl = $('toast');
  let toastTimer;
  function toast(msg, ms = 1400) {
    toastEl.textContent = msg;
    toastEl.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toastEl.classList.remove('show'), ms);
  }

  // ---------- Auth ----------
  async function init() {
    const { data: { session } } = await sb.auth.getSession();
    if (session) {
      onSignedIn(session.user);
    } else {
      showAuth();
    }
    sb.auth.onAuthStateChange((event, session) => {
      if (event === 'SIGNED_IN' && session) onSignedIn(session.user);
      if (event === 'SIGNED_OUT') showAuth();
    });
  }

  function showAuth() {
    $('authScreen').hidden = false;
    $('app').hidden = true;
    me = null;
    setTimeout(() => $('emailInput').focus(), 50);
  }

  async function onSignedIn(user) {
    me = user;
    $('authScreen').hidden = true;
    $('app').hidden = false;
    $('userChip').textContent = user.email;
    await loadBoards();
    maybeOfferLegacyImport();
    render();
  }

  $('signinBtn').addEventListener('click', sendMagicLink);
  $('emailInput').addEventListener('keydown', (e) => { if (e.key === 'Enter') sendMagicLink(); });
  async function sendMagicLink() {
    const email = $('emailInput').value.trim();
    const msg = $('authMsg');
    if (!email) { msg.textContent = 'Enter your email'; msg.className = 'auth-msg err'; return; }
    $('signinBtn').disabled = true;
    msg.textContent = 'Sending…'; msg.className = 'auth-msg';
    const { error } = await sb.auth.signInWithOtp({
      email,
      options: { emailRedirectTo: window.location.origin + window.location.pathname },
    });
    $('signinBtn').disabled = false;
    if (error) {
      msg.textContent = 'Error: ' + error.message;
      msg.className = 'auth-msg err';
    } else {
      msg.textContent = '✓ Check your inbox for the link';
      msg.className = 'auth-msg ok';
    }
  }

  $('signoutBtn').addEventListener('click', async () => {
    await sb.auth.signOut();
    boards = []; activeBoardId = null;
    if (realtimeChannel) { sb.removeChannel(realtimeChannel); realtimeChannel = null; }
  });

  // Theme toggle — cycle through THEMES
  $('themeBtn').addEventListener('click', () => {
    const cur = localStorage.getItem(THEME_KEY) || 'pink';
    const next = THEMES[(THEMES.indexOf(cur) + 1) % THEMES.length];
    applyTheme(next);
    toast(next === 'dungeon' ? '🕯️ dungeon mode' : '🌸 pink retro');
  });
  // Re-apply theme so the button gets its initial label (themeBtn wasn't in DOM at script init time)
  applyTheme(localStorage.getItem(THEME_KEY) || 'pink');

  // ---------- Board CRUD ----------
  async function loadBoards() {
    // Returns own boards plus public boards (covered by RLS policies).
    const { data, error } = await sb.from('boards')
      .select('*')
      .order('updated_at', { ascending: false });
    if (error) { console.error(error); toast('load failed: ' + error.message, 3000); return; }
    boards = data || [];
    if (!activeBoardId && boards.length) activeBoardId = boards[0].id;
    subscribeRealtime();
  }

  function activeBoard() {
    return boards.find(b => b.id === activeBoardId) || null;
  }

  function canEdit(board) {
    if (!board || !me) return false;
    return board.owner_id === me.id || board.is_public;
  }

  async function createBoard(name) {
    const newBoard = {
      owner_id: me.id,
      name,
      data: { swimlanes: [{
        id: uid(),
        name: 'Main',
        collapsed: false,
        columns: [
          { id: uid(), name: 'To Do', cards: [] },
          { id: uid(), name: 'Doing', cards: [] },
          { id: uid(), name: 'Done', cards: [] },
        ]
      }]},
      is_public: false,
    };
    const { data, error } = await sb.from('boards').insert(newBoard).select().single();
    if (error) { toast('create failed: ' + error.message, 3000); return; }
    boards.unshift(data);
    activeBoardId = data.id;
    subscribeRealtime();
    render();
    toast('board created');
  }

  async function deleteBoard(board) {
    const { error } = await sb.from('boards').delete().eq('id', board.id);
    if (error) { toast('delete failed: ' + error.message, 3000); return; }
    boards = boards.filter(b => b.id !== board.id);
    if (activeBoardId === board.id) activeBoardId = boards[0]?.id || null;
    subscribeRealtime();
    render();
    toast('board deleted');
  }

  async function renameBoard(board, name) {
    board.name = name;
    const { error } = await sb.from('boards').update({ name }).eq('id', board.id);
    if (error) toast('rename failed: ' + error.message, 3000);
    render();
  }

  async function togglePublic(board) {
    const next = !board.is_public;
    if (next && !confirm('Make "' + board.name + '" public? Anyone signed in will be able to view AND edit it.')) return;
    if (!next && !confirm('Make "' + board.name + '" private? Other people will lose access immediately.')) return;
    const { error } = await sb.from('boards').update({ is_public: next }).eq('id', board.id);
    if (error) { toast('failed: ' + error.message, 3000); return; }
    board.is_public = next;
    render();
    toast(next ? 'now public' : 'now private');
  }

  // Throttled save: collects mutations to .data and pushes once per 400ms.
  function saveBoardSoon(board) {
    pendingSave = { boardId: board.id, payload: { data: board.data, name: board.name } };
    if (saveTimer) return;
    saveTimer = setTimeout(async () => {
      const job = pendingSave; pendingSave = null; saveTimer = null;
      if (!job) return;
      const { error } = await sb.from('boards').update(job.payload).eq('id', job.boardId);
      if (error) toast('save failed: ' + error.message, 3000);
    }, 400);
  }

  // ---------- Realtime ----------
  function subscribeRealtime() {
    if (realtimeChannel) sb.removeChannel(realtimeChannel);
    if (!boards.length) { realtimeChannel = null; return; }
    realtimeChannel = sb.channel('boards-rt')
      .on('postgres_changes',
        { event: '*', schema: 'public', table: 'boards' },
        (payload) => {
          if (payload.eventType === 'INSERT') {
            const row = payload.new;
            if (!boards.find(b => b.id === row.id)) {
              boards.unshift(row);
              render();
            }
          } else if (payload.eventType === 'UPDATE') {
            const row = payload.new;
            const i = boards.findIndex(b => b.id === row.id);
            if (i !== -1) {
              // Don't clobber if we just typed something locally and the echo hasn't caught up.
              if (pendingSave && pendingSave.boardId === row.id) return;
              boards[i] = row;
              render();
            } else if (row.is_public) {
              // A board became public — pull it in.
              boards.push(row); render();
            }
          } else if (payload.eventType === 'DELETE') {
            const id = payload.old.id;
            boards = boards.filter(b => b.id !== id);
            if (activeBoardId === id) activeBoardId = boards[0]?.id || null;
            render();
          }
        })
      .subscribe();
  }

  // ---------- Migration from v1 localStorage ----------
  async function maybeOfferLegacyImport() {
    let legacy;
    try { legacy = JSON.parse(localStorage.getItem(LEGACY_KEY) || 'null'); } catch (_) {}
    if (!legacy || !Array.isArray(legacy.boards) || !legacy.boards.length) return;
    const myBoardCount = boards.filter(b => b.owner_id === me.id).length;
    if (myBoardCount > 0) return; // user already has cloud boards; don't pester
    if (!confirm('Found ' + legacy.boards.length + ' board(s) saved in this browser from the old version. Upload them to your account?')) {
      localStorage.removeItem(LEGACY_KEY);
      return;
    }
    const rows = legacy.boards.map(b => ({
      owner_id: me.id,
      name: b.name || 'Untitled',
      data: { columns: b.columns || [] },
      is_public: false,
    }));
    const { data, error } = await sb.from('boards').insert(rows).select();
    if (error) { toast('import failed: ' + error.message, 3000); return; }
    boards = (data || []).concat(boards);
    if (!activeBoardId && boards.length) activeBoardId = boards[0].id;
    localStorage.removeItem(LEGACY_KEY);
    subscribeRealtime();
    render();
    toast('imported ' + rows.length + ' board(s)');
  }

  // ---------- Render ----------
  const tabsEl = $('boardTabs');
  const columnsEl = $('columns');
  const boardVisEl = $('boardVis');
  const toggleVisBtn = $('toggleVisBtn');
  const readOnlyBanner = $('readOnlyBanner');

  function render() {
    if (!me) return;
    renderTabs();
    renderBoard();
  }

  function renderTabs() {
    tabsEl.innerHTML = '';
    boards.forEach(b => {
      const t = document.createElement('button');
      t.className = 'tab' + (b.id === activeBoardId ? ' active' : '');
      const label = document.createElement('span');
      label.textContent = b.name;
      t.appendChild(label);
      if (b.is_public) {
        const dot = document.createElement('span');
        dot.className = 'pub-dot';
        dot.title = 'Public';
        t.appendChild(dot);
      }
      t.addEventListener('click', () => {
        activeBoardId = b.id; render();
      });
      t.addEventListener('dblclick', () => {
        if (b.owner_id === me.id) openBoardModal(b);
      });
      if (b.owner_id === me.id) {
        const x = document.createElement('span');
        x.className = 'x'; x.textContent = '✕'; x.title = 'Delete board';
        x.addEventListener('click', (e) => {
          e.stopPropagation();
          if (confirm('Delete board "' + b.name + '"? This cannot be undone.')) deleteBoard(b);
        });
        t.appendChild(x);
      }
      tabsEl.appendChild(t);
    });
  }

  function renderBoard() {
    const board = activeBoard();
    columnsEl.innerHTML = '';
    boardVisEl.innerHTML = '';
    toggleVisBtn.hidden = true;
    readOnlyBanner.hidden = true;

    if (!board) {
      const empty = document.createElement('div');
      empty.className = 'empty-state';
      empty.textContent = 'no boards yet — hit "+ Board" to start';
      columnsEl.appendChild(empty);
      return;
    }

    // Migrate legacy { columns: [...] } → { swimlanes: [{ name: board.name, columns }] }
    if (board.data && board.data.columns && !board.data.swimlanes) {
      board.data.swimlanes = [{
        id: uid(),
        name: board.name || 'Main',
        collapsed: false,
        columns: board.data.columns
      }];
      delete board.data.columns;
      saveBoardSoon(board);
    }
    if (!board.data) board.data = {};
    if (!board.data.swimlanes) board.data.swimlanes = [];

    const lanes = board.data.swimlanes;

    const badge = document.createElement('span');
    badge.className = board.is_public ? 'public-badge' : 'private-badge';
    badge.textContent = board.is_public ? '◉ public' : '◯ private';
    boardVisEl.appendChild(badge);

    if (board.owner_id === me.id) {
      toggleVisBtn.hidden = false;
      toggleVisBtn.textContent = board.is_public ? 'Make private' : 'Make public';
    } else if (!board.is_public) {
      readOnlyBanner.hidden = false;
    }

    const editable = canEdit(board);

    lanes.forEach(lane => columnsEl.appendChild(renderSwimlane(board, lane, editable)));

    if (editable) {
      const addLane = document.createElement('button');
      addLane.className = 'add-swimlane';
      addLane.textContent = '+ ADD SWIMLANE';
      addLane.addEventListener('click', async () => {
        const name = await customPrompt('New Swimlane', 'Swimlane name');
        if (!name) return;
        lanes.push({ id: uid(), name, collapsed: false, columns: [] });
        saveBoardSoon(board); render();
      });
      columnsEl.appendChild(addLane);
    }
  }

  function renderSwimlane(board, lane, editable) {
    const wrap = document.createElement('div');
    wrap.className = 'swimlane' + (lane.collapsed ? ' collapsed' : '');
    wrap.dataset.laneId = lane.id;

    const header = document.createElement('div');
    header.className = 'swimlane-header';

    const toggle = document.createElement('span');
    toggle.className = 'swimlane-toggle';
    toggle.textContent = '>';
    toggle.title = lane.collapsed ? 'Expand' : 'Collapse';
    toggle.addEventListener('click', () => {
      lane.collapsed = !lane.collapsed;
      saveBoardSoon(board); render();
    });
    header.appendChild(toggle);

    const name = document.createElement('h2');
    name.className = 'swimlane-name';
    name.textContent = lane.name;
    if (editable) {
      name.title = 'Click to rename';
      name.addEventListener('click', () => {
        name.contentEditable = 'true';
        name.focus();
        const range = document.createRange();
        range.selectNodeContents(name);
        const sel = window.getSelection();
        sel.removeAllRanges(); sel.addRange(range);
      });
      name.addEventListener('blur', () => {
        name.contentEditable = 'false';
        const txt = name.textContent.trim() || lane.name;
        lane.name = txt; name.textContent = txt;
        saveBoardSoon(board);
      });
      name.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') { e.preventDefault(); name.blur(); }
      });
    }
    header.appendChild(name);

    const cols = lane.columns || [];
    // Auto-sort cards by priority within each column
    cols.forEach(col => {
      if (!col.cards) return;
      const rank = (p) => p === 'high' ? 0 : p === 'medium' ? 1 : p === 'low' ? 2 : 3;
      const indexed = col.cards.map((c, i) => ({c, i}));
      indexed.sort((a, b) => (rank(a.c.priority) - rank(b.c.priority)) || (a.i - b.i));
      col.cards = indexed.map(x => x.c);
    });
    const totalCards = cols.reduce((n, c) => n + (c.cards || []).length, 0);

    const meta = document.createElement('span');
    meta.className = 'swimlane-meta';
    meta.textContent = totalCards + ' card' + (totalCards === 1 ? '' : 's') + ' · ' + cols.length + ' column' + (cols.length === 1 ? '' : 's');
    header.appendChild(meta);

    if (editable && (board.data.swimlanes || []).length > 1) {
      const del = document.createElement('button');
      del.className = 'btn ghost swimlane-delete';
      del.textContent = '✕';
      del.title = 'Delete swimlane';
      del.addEventListener('click', () => {
        if (totalCards > 0 && !confirm('Delete swimlane "' + lane.name + '" and its ' + totalCards + ' card(s)?')) return;
        board.data.swimlanes = board.data.swimlanes.filter(l => l.id !== lane.id);
        saveBoardSoon(board); render();
      });
      header.appendChild(del);
    }

    wrap.appendChild(header);

    const colsEl = document.createElement('div');
    colsEl.className = 'swimlane-cols';
    cols.forEach(col => colsEl.appendChild(renderColumn(board, lane, col, editable)));

    if (editable) {
      const addCol = document.createElement('button');
      addCol.className = 'add-column';
      addCol.textContent = '+';
      addCol.title = 'Add column';
      addCol.addEventListener('click', async () => {
        const cname = await customPrompt('New Column', 'Column name');
        if (!cname) return;
        lane.columns = lane.columns || [];
        lane.columns.push({ id: uid(), name: cname, cards: [] });
        saveBoardSoon(board); render();
      });
      colsEl.appendChild(addCol);
    }

    wrap.appendChild(colsEl);
    return wrap;
  }

  function renderColumn(board, lane, col, editable) {
    const wrap = document.createElement('div');
    wrap.className = 'column';
    wrap.dataset.colId = col.id;
    wrap.dataset.laneId = lane.id;

    const header = document.createElement('div');
    header.className = 'column-header';

    if (editable) {
      const handle = document.createElement('div');
      handle.className = 'col-handle';
      handle.textContent = '⋮⋮';
      handle.title = 'Drag to reorder column';
      handle.draggable = true;
      handle.addEventListener('dragstart', (e) => {
        wrap.classList.add('col-dragging');
        e.dataTransfer.setData('application/x-bones-column', col.id);
        e.dataTransfer.setData('text/plain', col.id);
        e.dataTransfer.effectAllowed = 'move';
      });
      handle.addEventListener('dragend', () => {
        wrap.classList.remove('col-dragging');
        document.querySelectorAll('.column').forEach(c => {
          c.classList.remove('col-drop-before');
          c.classList.remove('col-drop-after');
        });
      });
      header.appendChild(handle);
    }

    // Column-level drop target for column reordering
    wrap.addEventListener('dragover', (e) => {
      if (!e.dataTransfer.types.includes('application/x-bones-column')) return;
      e.preventDefault();
      const r = wrap.getBoundingClientRect();
      const before = e.clientX < r.left + r.width / 2;
      wrap.classList.toggle('col-drop-before', before);
      wrap.classList.toggle('col-drop-after', !before);
    });
    wrap.addEventListener('dragleave', (e) => {
      // only clear if pointer actually left the column
      const r = wrap.getBoundingClientRect();
      if (e.clientX < r.left || e.clientX > r.right || e.clientY < r.top || e.clientY > r.bottom) {
        wrap.classList.remove('col-drop-before');
        wrap.classList.remove('col-drop-after');
      }
    });
    wrap.addEventListener('drop', (e) => {
      if (!e.dataTransfer.types.includes('application/x-bones-column')) return;
      e.preventDefault();
      const fromId = e.dataTransfer.getData('application/x-bones-column');
      const before = wrap.classList.contains('col-drop-before');
      wrap.classList.remove('col-drop-before');
      wrap.classList.remove('col-drop-after');
      if (!fromId || fromId === col.id) return;
      const cols = lane.columns;
      const fromIdx = cols.findIndex(c => c.id === fromId);
      let toIdx = cols.findIndex(c => c.id === col.id);
      if (fromIdx === -1 || toIdx === -1) return; // column drag is scoped to its swimlane
      const [moved] = cols.splice(fromIdx, 1);
      if (fromIdx < toIdx) toIdx--;
      if (!before) toIdx++;
      cols.splice(toIdx, 0, moved);
      saveBoardSoon(board); render();
    });

    const name = document.createElement('div');
    name.className = 'column-name';
    name.textContent = col.name;
    if (editable) {
      name.title = 'Click to rename';
       name.addEventListener('click', () => {
        name.contentEditable = 'true';
        name.focus();
        const range = document.createRange();
        range.selectNodeContents(name);
        const sel = window.getSelection();
        sel.removeAllRanges(); sel.addRange(range);
      });
      name.addEventListener('blur', () => {
        name.contentEditable = 'false';
        const txt = name.textContent.trim() || col.name;
        col.name = txt; name.textContent = txt;
        saveBoardSoon(board);
      });
      name.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') { e.preventDefault(); name.blur(); }
      });
    }

    const count = document.createElement('div');
    count.className = 'column-count';
    count.textContent = (col.cards || []).length;

    const actions = document.createElement('div');
    actions.className = 'column-actions';
    if (editable) {
      const delBtn = document.createElement('button');
      delBtn.className = 'icon-btn';
      delBtn.textContent = '✕'; delBtn.title = 'Delete column';
      delBtn.addEventListener('click', () => {
        if ((col.cards || []).length && !confirm('Delete column "' + col.name + '" and its ' + col.cards.length + ' card(s)?')) return;
        lane.columns = lane.columns.filter(c => c.id !== col.id);
        saveBoardSoon(board); render();
      });
      actions.appendChild(delBtn);
    }

    header.appendChild(name);
    header.appendChild(count);
    header.appendChild(actions);
    wrap.appendChild(header);

    const cardsEl = document.createElement('div');
    cardsEl.className = 'cards';

    if (editable) {
      cardsEl.addEventListener('dragover', (e) => {
        if (e.dataTransfer.types.includes('application/x-bones-column')) return;
        e.preventDefault();
        cardsEl.classList.add('drag-over');
      });
      cardsEl.addEventListener('dragleave', () => cardsEl.classList.remove('drag-over'));
      cardsEl.addEventListener('drop', (e) => {
        if (e.dataTransfer.types.includes('application/x-bones-column')) return;
        e.preventDefault();
        cardsEl.classList.remove('drag-over');
        const data = e.dataTransfer.getData('text/plain');
        if (!data) return;
        let parsed;
        try { parsed = JSON.parse(data); } catch (_) { return; }
        if (!parsed || !parsed.cardId) return;
        moveCard(board, parsed.cardId, parsed.fromColId, col.id, getInsertIndex(cardsEl, e.clientY));
      });
    }

    (col.cards || []).forEach(card => cardsEl.appendChild(renderCard(board, col, card, editable)));
    wrap.appendChild(cardsEl);

    if (editable) {
      const addCardBtn = document.createElement('button');
      addCardBtn.className = 'add-card';
      addCardBtn.textContent = '+ ADD CARD';
      addCardBtn.addEventListener('click', async () => {
        const title = await customPrompt('New Card', 'Card title');
        if (!title) return;
        col.cards = col.cards || [];
        col.cards.push({ id: uid(), title, description: '', due: '', tags: [], createdAt: Date.now() });
        saveBoardSoon(board); render();
      });
      wrap.appendChild(addCardBtn);
    }

    return wrap;
  }

  function renderCard(board, col, card, editable) {
    // Backfill createdAt for legacy cards
    if (!card.createdAt) card.createdAt = Date.now();

    const el = document.createElement('div');
    el.className = 'card';
    if (card.priority) el.classList.add('prio-' + card.priority);
    if (card.color && card.color !== 'default') el.classList.add('color-' + card.color);
    el.draggable = editable;

    // Cobweb logic — manual force OR (older than 2 weeks AND not in Done)
    const inDone = (col.name || '').trim().toLowerCase() === 'done';
    const TWO_WEEKS = 14 * 24 * 60 * 60 * 1000;
    const ageMs = Date.now() - (card.createdAt || Date.now());
    const autoCobweb = !inDone && ageMs > TWO_WEEKS;
    const showCobweb = card.cobweb === true || autoCobweb;
    const isManualCobweb = card.cobweb === true;
    if (showCobweb) {
      const web = document.createElement('div');
      web.className = 'cobweb';
      web.innerHTML = '<svg viewBox="0 0 200 120" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">' +
        '<g fill="none" stroke="#fff" stroke-width="1" stroke-linecap="round" vector-effect="non-scaling-stroke">' +
          // Top-left corner web — fan of arcs + spokes
          '<g>' +
            '<path d="M0,10 Q10,10 10,0"/>' +
            '<path d="M0,22 Q22,22 22,0"/>' +
            '<path d="M0,34 Q34,34 34,0"/>' +
            '<path d="M0,46 Q46,46 46,0"/>' +
            '<path d="M0,58 Q58,58 58,0"/>' +
            '<line x1="0" y1="0" x2="60" y2="0"/>' +
            '<line x1="0" y1="0" x2="55" y2="14"/>' +
            '<line x1="0" y1="0" x2="48" y2="28"/>' +
            '<line x1="0" y1="0" x2="36" y2="42"/>' +
            '<line x1="0" y1="0" x2="20" y2="52"/>' +
            '<line x1="0" y1="0" x2="0" y2="60"/>' +
          '</g>' +
          // Top-right corner web (mirrored)
          '<g transform="translate(200,0) scale(-1,1)">' +
            '<path d="M0,10 Q10,10 10,0"/>' +
            '<path d="M0,22 Q22,22 22,0"/>' +
            '<path d="M0,34 Q34,34 34,0"/>' +
            '<path d="M0,46 Q46,46 46,0"/>' +
            '<path d="M0,58 Q58,58 58,0"/>' +
            '<line x1="0" y1="0" x2="60" y2="0"/>' +
            '<line x1="0" y1="0" x2="55" y2="14"/>' +
            '<line x1="0" y1="0" x2="48" y2="28"/>' +
            '<line x1="0" y1="0" x2="36" y2="42"/>' +
            '<line x1="0" y1="0" x2="20" y2="52"/>' +
            '<line x1="0" y1="0" x2="0" y2="60"/>' +
          '</g>' +
          // Bottom-left corner (smaller)
          '<g transform="translate(0,120) scale(1,-1)">' +
            '<path d="M0,8 Q8,8 8,0"/>' +
            '<path d="M0,18 Q18,18 18,0"/>' +
            '<path d="M0,28 Q28,28 28,0"/>' +
            '<path d="M0,38 Q38,38 38,0"/>' +
            '<line x1="0" y1="0" x2="40" y2="0"/>' +
            '<line x1="0" y1="0" x2="32" y2="20"/>' +
            '<line x1="0" y1="0" x2="20" y2="34"/>' +
            '<line x1="0" y1="0" x2="0" y2="40"/>' +
          '</g>' +
          // Bottom-right corner (smaller)
          '<g transform="translate(200,120) scale(-1,-1)">' +
            '<path d="M0,8 Q8,8 8,0"/>' +
            '<path d="M0,18 Q18,18 18,0"/>' +
            '<path d="M0,28 Q28,28 28,0"/>' +
            '<path d="M0,38 Q38,38 38,0"/>' +
            '<line x1="0" y1="0" x2="40" y2="0"/>' +
            '<line x1="0" y1="0" x2="32" y2="20"/>' +
            '<line x1="0" y1="0" x2="20" y2="34"/>' +
            '<line x1="0" y1="0" x2="0" y2="40"/>' +
          '</g>' +
          // Hanging drips from top edge
          '<line x1="80"  y1="0" x2="80"  y2="18"/>' +
          '<line x1="105" y1="0" x2="105" y2="10"/>' +
          '<line x1="130" y1="0" x2="130" y2="22"/>' +
          '<line x1="92"  y1="0" x2="92"  y2="6"/>' +
          '<line x1="118" y1="0" x2="118" y2="12"/>' +
        '</g>' +
        '</svg>';
      el.appendChild(web);
    }

    const t = document.createElement('div');
    t.className = 'card-title';
    t.textContent = card.title;
    el.appendChild(t);

    if (card.description) {
      const d = document.createElement('div');
      d.style.opacity = '0.75';
      d.style.fontSize = '13px';
      d.style.whiteSpace = 'pre-wrap';
      d.textContent = card.description.length > 120 ? card.description.slice(0, 120) + '…' : card.description;
      el.appendChild(d);
    }

    const hasMeta = card.due || card.priority || (card.tags && card.tags.length);
    if (hasMeta) {
      const meta = document.createElement('div');
      meta.className = 'card-meta';
      if (card.priority) {
        const p = document.createElement('span');
        p.className = 'priority ' + card.priority;
        p.textContent = card.priority === 'low' ? '↓ low'
                      : card.priority === 'medium' ? '→ med'
                      : '↑ high';
        meta.appendChild(p);
      }
      if (card.due) {
        const due = document.createElement('span');
        due.className = 'due ' + dueClass(card.due);
        due.textContent = '⏱ ' + card.due;
        meta.appendChild(due);
      }
      (card.tags || []).forEach(tag => {
        if (!tag) return;
        const tg = document.createElement('span');
        tg.className = 'tag';
        tg.textContent = tag;
        meta.appendChild(tg);
      });
      el.appendChild(meta);
    }

    if (editable) {
      el.addEventListener('click', () => {
        // First click on auto-cobwebbed card: dust it off, don't open modal
        if (showCobweb && !isManualCobweb) {
          const broom = document.createElement('div');
          broom.className = 'broom';
          broom.textContent = '🧹';
          el.appendChild(broom);
          el.classList.add('dusting');
          setTimeout(() => {
            card.createdAt = Date.now();  // reset age
            saveBoardSoon(board);
            render();
          }, 800);
          return;
        }
        openCardModal(board, col, card);
      });
      el.addEventListener('dragstart', (e) => {
        el.classList.add('dragging');
        e.dataTransfer.setData('text/plain', JSON.stringify({ cardId: card.id, fromColId: col.id }));
        e.dataTransfer.effectAllowed = 'move';
      });
      el.addEventListener('dragend', () => el.classList.remove('dragging'));
    } else {
      el.style.cursor = 'default';
    }

    return el;
  }

  function dueClass(dueStr) {
    if (!dueStr) return '';
    const today = new Date(); today.setHours(0,0,0,0);
    const d = new Date(dueStr);
    const diff = (d - today) / 86400000;
    if (diff < 0) return 'overdue';
    if (diff <= 2) return 'soon';
    return '';
  }

  function getInsertIndex(container, y) {
    const cards = [...container.querySelectorAll('.card:not(.dragging)')];
    for (let i = 0; i < cards.length; i++) {
      const r = cards[i].getBoundingClientRect();
      if (y < r.top + r.height / 2) return i;
    }
    return cards.length;
  }

  function moveCard(board, cardId, fromColId, toColId, insertIdx) {
    const allCols = (board.data.swimlanes || []).flatMap(l => l.columns || []);
    const fromCol = allCols.find(c => c.id === fromColId);
    const toCol = allCols.find(c => c.id === toColId);
    if (!fromCol || !toCol) return;
    const idx = (fromCol.cards || []).findIndex(c => c.id === cardId);
    if (idx === -1) return;
    const [card] = fromCol.cards.splice(idx, 1);
    let target = insertIdx;
    if (fromCol === toCol && idx < insertIdx) target = insertIdx - 1;
    toCol.cards = toCol.cards || [];
    target = Math.max(0, Math.min(target, toCol.cards.length));
    toCol.cards.splice(target, 0, card);
    saveBoardSoon(board); render();
    // Confetti when a card moves into a "Done" column from elsewhere
    if (fromCol !== toCol && (toCol.name || '').trim().toLowerCase() === 'done') {
      popConfetti();
    }
  }

  function popConfetti() {
    const colors = ['#ff3eaa', '#ffe066', '#6fe9ff', '#7dffac', '#ff7ac6', '#b388ff', '#ff0080'];
    const container = document.createElement('div');
    container.className = 'confetti-container';
    for (let i = 0; i < 90; i++) {
      const p = document.createElement('div');
      p.className = 'confetti-piece';
      p.style.left = (Math.random() * 100) + 'vw';
      p.style.background = colors[Math.floor(Math.random() * colors.length)];
      p.style.animationDuration = (1.2 + Math.random() * 1.6) + 's';
      p.style.animationDelay = (Math.random() * 0.5) + 's';
      p.style.setProperty('--tx', ((Math.random() - 0.5) * 240) + 'px');
      p.style.transform = 'rotate(' + (Math.random() * 360) + 'deg)';
      container.appendChild(p);
    }
    document.body.appendChild(container);
    setTimeout(() => container.remove(), 4000);
  }

  // ---------- Card modal ----------
  const cardModal = $('cardModal');
  const cardTitleInp = $('cardTitle');
  const cardDescInp = $('cardDesc');
  const cardDueInp = $('cardDue');
  const cardTagsInp = $('cardTags');
  const cardPriorityInp = $('cardPriority');
  const cardSwatches = $('cardSwatches');
  const cardCobwebInp = $('cardCobweb');
  let editingRef = null;
  let pickedColor = 'default';

  cardSwatches.addEventListener('click', (e) => {
    const sw = e.target.closest('.swatch');
    if (!sw) return;
    pickedColor = sw.dataset.color;
    [...cardSwatches.children].forEach(c => c.classList.toggle('selected', c === sw));
  });

  function openCardModal(board, col, card) {
    editingRef = { board, col, card };
    cardTitleInp.value = card.title;
    cardDescInp.value = card.description || '';
    cardDueInp.value = card.due || '';
    cardTagsInp.value = (card.tags || []).join(', ');
    cardPriorityInp.value = card.priority || '';
    cardCobwebInp.checked = card.cobweb === true;
    pickedColor = card.color || 'default';
    [...cardSwatches.children].forEach(c => c.classList.toggle('selected', c.dataset.color === pickedColor));
    cardModal.classList.add('show');
    setTimeout(() => cardTitleInp.focus(), 50);
  }
  function closeCardModal() { cardModal.classList.remove('show'); editingRef = null; }
  $('cancelCardBtn').addEventListener('click', closeCardModal);
  $('saveCardBtn').addEventListener('click', () => {
    if (!editingRef) return;
    const { board, card } = editingRef;
    card.title = cardTitleInp.value.trim() || 'Untitled';
    card.description = cardDescInp.value.trim();
    card.due = cardDueInp.value || '';
    card.tags = cardTagsInp.value.split(',').map(s => s.trim()).filter(Boolean);
    card.priority = cardPriorityInp.value || '';
    card.color = pickedColor === 'default' ? '' : pickedColor;
    card.cobweb = cardCobwebInp.checked === true;
    saveBoardSoon(board); render(); closeCardModal(); toast('card saved');
  });
  $('deleteCardBtn').addEventListener('click', () => {
    if (!editingRef) return;
    const { board, col, card } = editingRef;
    if (!confirm('Delete card "' + card.title + '"?')) return;
    col.cards = col.cards.filter(c => c.id !== card.id);
    saveBoardSoon(board); render(); closeCardModal(); toast('card deleted');
  });
  cardModal.addEventListener('click', (e) => { if (e.target === cardModal) closeCardModal(); });

  // ---------- Board modal ----------
  const boardModal = $('boardModal');
  const boardModalTitle = $('boardModalTitle');
  const boardNameInp = $('boardName');
  let editingBoard = null;

  function openBoardModal(b) {
    editingBoard = b || null;
    boardModalTitle.textContent = b ? 'Rename Board' : 'New Board';
    boardNameInp.value = b ? b.name : '';
    boardModal.classList.add('show');
    setTimeout(() => boardNameInp.focus(), 50);
  }
  function closeBoardModal() { boardModal.classList.remove('show'); editingBoard = null; }

  $('newBoardBtn').addEventListener('click', () => openBoardModal(null));
  $('cancelBoardBtn').addEventListener('click', closeBoardModal);
  $('saveBoardBtn').addEventListener('click', async () => {
    const name = boardNameInp.value.trim();
    if (!name) return;
    if (editingBoard) {
      await renameBoard(editingBoard, name);
      toast('board renamed');
    } else {
      await createBoard(name);
    }
    closeBoardModal();
  });
  boardNameInp.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') $('saveBoardBtn').click();
  });
  boardModal.addEventListener('click', (e) => { if (e.target === boardModal) closeBoardModal(); });

  toggleVisBtn.addEventListener('click', () => {
    const b = activeBoard();
    if (b) togglePublic(b);
    closeMenu();
  });

  // ---------- Burger menu ----------
  const menuBtn = $('menuBtn');
  const menuPanel = $('menuPanel');
  function openMenu() {
    menuPanel.classList.add('open');
    menuBtn.setAttribute('aria-expanded', 'true');
  }
  function closeMenu() {
    menuPanel.classList.remove('open');
    menuBtn.setAttribute('aria-expanded', 'false');
  }
  menuBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    if (menuPanel.classList.contains('open')) closeMenu(); else openMenu();
  });
  document.addEventListener('click', (e) => {
    if (!menuPanel.classList.contains('open')) return;
    if (e.target === menuBtn || menuPanel.contains(e.target)) return;
    closeMenu();
  });

  // ---------- Custom input modal (themed replacement for prompt) ----------
  const inputModal = $('inputModal');
  const inputModalTitle = $('inputModalTitle');
  const inputModalLabel = $('inputModalLabel');
  const inputModalField = $('inputModalField');
  let inputModalResolve = null;
  function customPrompt(title, label) {
    inputModalTitle.textContent = title;
    inputModalLabel.textContent = label;
    inputModalField.value = '';
    inputModal.classList.add('show');
    setTimeout(() => inputModalField.focus(), 50);
    return new Promise((res) => { inputModalResolve = res; });
  }
  function closeInputModal(val) {
    inputModal.classList.remove('show');
    if (inputModalResolve) { const r = inputModalResolve; inputModalResolve = null; r(val); }
  }
  $('inputModalCancel').addEventListener('click', () => closeInputModal(null));
  $('inputModalOk').addEventListener('click', () => closeInputModal(inputModalField.value.trim() || null));
  inputModalField.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') { e.preventDefault(); $('inputModalOk').click(); }
  });
  inputModal.addEventListener('click', (e) => { if (e.target === inputModal) closeInputModal(null); });

  // ---------- Keyboard ----------
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
      if (cardModal.classList.contains('show')) closeCardModal();
      if (boardModal.classList.contains('show')) closeBoardModal();
      if (inputModal.classList.contains('show')) closeInputModal(null);
      if (menuPanel.classList.contains('open')) closeMenu();
    }
  });

  // ---------- Go ----------
  init();
})();
</script>
</body>
</html>
